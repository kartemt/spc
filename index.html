    <script>
      // GitHub Pages SPA routing: restore path from redirect
      (function() {
        var p = window.location.search;
        if (p && p.indexOf('?p=') === 0) {
          var path = decodeURIComponent(p.slice(3).split('&')[0]);
          var query = p.indexOf('&q=') > -1 ? '?' + decodeURIComponent(p.slice(p.indexOf('&q=') + 3)) : '';
          window.history.replaceState(null, null, '/' + path + query + window.location.hash);
        }
      })();
    </script>
