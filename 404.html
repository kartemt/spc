<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Strategic Portfolio Calculator</title>
  <script>
    var base = '/spc/';
    var path = window.location.pathname.replace(base, '');
    var search = window.location.search;
    window.location.replace(base + '?p=' + encodeURIComponent(path) + 
      (search ? '&q=' + encodeURIComponent(search.slice(1)) : '') +
      window.location.hash);
  </script>
</head>
<body></body>
</html>
